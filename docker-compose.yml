services:
  postgres:
    image: postgres:16-alpine
    container_name: swedenmark-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: swedenmark
    ports:
      - "5432:5432"
    volumes:
      - swedenmark-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d swedenmark"]
      interval: 2s
      timeout: 3s
      retries: 20

volumes:
  swedenmark-postgres:
